# Build AOS Migration Wizard for Windows (.exe), macOS (.app + .dmg), and Linux (binary).
# Artifacts are available to download from the Actions run summary (free for public repos).
# Hidden imports ensure the app works like local when run as a single file on any OS.
name: Build executables

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Allow manual "Run workflow" from Actions tab

jobs:
  build-windows:
    name: Windows (exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: |
          $addData = if (Test-Path favicon.png) { @('--add-data', 'favicon.png;.') } else { @() }
          pyinstaller --onefile --noconfirm --clean --name AOS-Migration-Wizard @addData `
            --hidden-import=areaMigration --hidden-import=availabilityTypeMigration `
            --hidden-import=clientAvailabilityMigration --hidden-import=clientLocationsMigration `
            --hidden-import=clientsMigration --hidden-import=distance_migration `
            --hidden-import=feasible_pairs_migration --hidden-import=geocodeCalculation `
            --hidden-import=userAvailabilityMigration --hidden-import=userLocationsMigration `
            --hidden-import=usersMigration --hidden-import=tests --hidden-import=tests.test_before_run --hidden-import=migration_support `
            wizard.py

      - name: Create zip (exe + logo when present)
        run: |
          New-Item -ItemType Directory -Force -Path release_zip
          Copy-Item dist/AOS-Migration-Wizard.exe release_zip/
          if (Test-Path favicon.png) { Copy-Item favicon.png release_zip/ }
          Compress-Archive -Path release_zip/* -DestinationPath dist/AOS-Migration-Wizard-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AOS-Migration-Wizard-windows
          path: |
            dist/AOS-Migration-Wizard.exe
            dist/AOS-Migration-Wizard-windows.zip

  build-macos:
    name: macOS (app + dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install create-dmg (for DMG)
        run: brew install create-dmg

      - name: Build .app with PyInstaller
        run: |
          ADD_DATA=""
          if [ -f favicon.png ]; then ADD_DATA=' --add-data favicon.png:.'; fi
          pyinstaller --noconfirm --clean --onedir --windowed --name AOS-Migration-Wizard $ADD_DATA \
            --hidden-import=areaMigration --hidden-import=availabilityTypeMigration \
            --hidden-import=clientAvailabilityMigration --hidden-import=clientLocationsMigration \
            --hidden-import=clientsMigration --hidden-import=distance_migration \
            --hidden-import=feasible_pairs_migration --hidden-import=geocodeCalculation \
            --hidden-import=userAvailabilityMigration --hidden-import=userLocationsMigration \
            --hidden-import=usersMigration --hidden-import=tests --hidden-import=tests.test_before_run --hidden-import=migration_support \
            wizard.py
          # PyInstaller outputs a folder; wrap as .app bundle
          if [ -d "dist/AOS-Migration-Wizard.app" ]; then
            echo "Already have .app bundle"
          else
            mkdir -p "dist/AOS-Migration-Wizard.app/Contents/MacOS"
            cp -R dist/AOS-Migration-Wizard/* "dist/AOS-Migration-Wizard.app/Contents/MacOS/" || true
            # Ensure executable has correct name
            EXE=$(find "dist/AOS-Migration-Wizard.app/Contents/MacOS" -type f -executable | head -1)
            if [ -n "$EXE" ] && [ "$(basename "$EXE")" != "AOS-Migration-Wizard" ]; then
              mv "$EXE" "dist/AOS-Migration-Wizard.app/Contents/MacOS/AOS-Migration-Wizard"
            fi
            python3 -c "
          import plistlib
          p = {
            'CFBundleExecutable': 'AOS-Migration-Wizard',
            'CFBundleIdentifier': 'com.aos.migration-wizard',
            'CFBundleName': 'AOS Migration Wizard',
            'CFBundlePackageType': 'APPL',
          }
          with open('dist/AOS-Migration-Wizard.app/Contents/Info.plist', 'wb') as f:
            plistlib.dump(p, f)
          "
          fi

      - name: Create DMG
        run: |
          mkdir -p dmg_content
          cp -R dist/AOS-Migration-Wizard.app dmg_content/
          DMG_NAME="AOS-Migration-Wizard-1.0.0.dmg"
          rm -f "dist/$DMG_NAME"
          create-dmg \
            --volname "AOS Migration Wizard" \
            --window-size 500 320 \
            --icon "AOS-Migration-Wizard.app" 180 150 \
            --app-drop-link 320 150 \
            "dist/$DMG_NAME" \
            dmg_content

      - name: Create zip (app + dmg + logo when present)
        run: |
          mkdir -p release_zip
          cp -R dist/AOS-Migration-Wizard.app release_zip/
          cp dist/AOS-Migration-Wizard-1.0.0.dmg release_zip/ 2>/dev/null || true
          [ -f favicon.png ] && cp favicon.png release_zip/
          cd release_zip && zip -r ../dist/AOS-Migration-Wizard-macos.zip . && cd ..

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AOS-Migration-Wizard-macos
          path: |
            dist/AOS-Migration-Wizard.app
            dist/AOS-Migration-Wizard-1.0.0.dmg
            dist/AOS-Migration-Wizard-macos.zip

  build-linux:
    name: Linux (binary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tkinter (for wizard GUI)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: |
          ADD_DATA=""
          [ -f favicon.png ] && ADD_DATA=' --add-data favicon.png:.'
          pyinstaller --onefile --noconfirm --clean --name AOS-Migration-Wizard $ADD_DATA \
            --hidden-import=areaMigration --hidden-import=availabilityTypeMigration \
            --hidden-import=clientAvailabilityMigration --hidden-import=clientLocationsMigration \
            --hidden-import=clientsMigration --hidden-import=distance_migration \
            --hidden-import=feasible_pairs_migration --hidden-import=geocodeCalculation \
            --hidden-import=userAvailabilityMigration --hidden-import=userLocationsMigration \
            --hidden-import=usersMigration --hidden-import=tests --hidden-import=tests.test_before_run --hidden-import=migration_support \
            wizard.py

      - name: Create zip (binary + logo when present)
        run: |
          mkdir -p release_zip
          cp dist/AOS-Migration-Wizard release_zip/
          [ -f favicon.png ] && cp favicon.png release_zip/
          cd release_zip && zip -r ../dist/AOS-Migration-Wizard-linux.zip . && cd ..

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: AOS-Migration-Wizard-linux
          path: |
            dist/AOS-Migration-Wizard
            dist/AOS-Migration-Wizard-linux.zip
